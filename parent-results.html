<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>بوابة أولياء الأمور — مدرسة الظهران الثانوية الحكومية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   VARIABLES — هوية وزارة التعليم
══════════════════════════════════════════ */
:root {
  --bg:         #04101f;
  --surface:    #0a1a2e;
  --surface2:   #0f2440;
  --surface3:   #152d4f;
  --border:     #1a3a58;
  --border2:    #235278;
  --green:      #0dcfda;
  --green-dk:   #0896a0;
  --gold:       #9338ff;
  --gold-lt:    #b07aff;
  --red:        #ef4444;
  --orange:     #f97316;
  --blue:       #2baddf;
  --purple:     #7258a5;
  --text:       #e2f4f8;
  --text-dim:   #7aadcc;
  --text-muted: #2e5570;
  --shadow:     0 8px 32px rgba(0,0,0,.6);
  --shadow-sm:  0 2px 10px rgba(0,0,0,.35);
  --r:          12px;
  --r-sm:       8px;
  --r-xs:       6px;
  --topbar-h:   60px;
  --glow-green: 0 0 20px rgba(13,207,218,.25);
  --glow-gold:  0 0 20px rgba(147,56,255,.25);
}

[data-theme="light"] {
  --bg:         #eef3f7;
  --surface:    #ffffff;
  --surface2:   #f4f8fb;
  --surface3:   #e8f0f6;
  --border:     #ccdce8;
  --border2:    #adc5d5;
  --green:      #0896a0;
  --green-dk:   #003944;
  --gold:       #6020b0;
  --gold-lt:    #7030a0;
  --red:        #dc2626;
  --orange:     #ea580c;
  --blue:       #1060a0;
  --purple:     #5c3e8a;
  --text:       #061428;
  --text-dim:   #2a4060;
  --text-muted: #6890a8;
  --shadow:     0 8px 24px rgba(0,30,60,.1);
  --shadow-sm:  0 2px 8px rgba(0,30,60,.07);
  --glow-green: 0 0 16px rgba(8,150,160,.15);
  --glow-gold:  0 0 16px rgba(96,32,176,.1);
}

/* ══════════════════════════════════════════
   BASE
══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Tajawal',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* animated mesh background */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 10% 0%,  rgba(13,207,218,.055) 0%,transparent 55%),
    radial-gradient(ellipse 60% 40% at 90% 100%,rgba(147,56,255,.05) 0%,transparent 55%),
    radial-gradient(ellipse 40% 30% at 50% 50%,  rgba(43,173,224,.025) 0%,transparent 55%);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
  background-size:200px;opacity:.6;
}
[data-theme="light"] body::before{
  background:
    radial-gradient(ellipse 80% 50% at 10% 0%,  rgba(8,150,160,.04) 0%,transparent 55%),
    radial-gradient(ellipse 60% 40% at 90% 100%,rgba(96,32,176,.035) 0%,transparent 55%);
}

/* ══════════════════════════════════════════
   PAGES
══════════════════════════════════════════ */
.page{display:none;min-height:100vh;position:relative;z-index:1;flex-direction:column}
.page.active{display:flex;animation:pageIn .28s cubic-bezier(.4,0,.2,1) both}
@keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}


/* ══════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════ */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:var(--topbar-h);
  background:rgba(10,26,46,.92);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:0 1px 0 rgba(13,207,218,.12),0 4px 20px rgba(0,0,0,.4);
}
[data-theme="light"] .topbar{
  background:rgba(255,255,255,.94);
  box-shadow:0 1px 0 rgba(8,150,160,.1),0 4px 16px rgba(0,30,60,.08);
}
.topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--green),var(--gold),var(--green),transparent);
  opacity:.4;
}
.topbar-brand{display:flex;align-items:center;gap:12px}
.topbar-brand .brand-icon{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,var(--green-dk),var(--green));
  display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0;
  box-shadow:var(--glow-green);
}
.brand-name{font-weight:800;font-size:.9rem;color:var(--text);line-height:1.25}
.brand-sub{color:var(--text-muted);font-size:.68rem;font-weight:500}
.topbar-center{display:flex;gap:2px}
.nav-btn{
  padding:7px 13px;border-radius:var(--r-sm);border:none;
  background:transparent;color:var(--text-dim);
  font-family:'Tajawal',sans-serif;font-size:.82rem;font-weight:600;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.nav-btn:hover{background:rgba(13,207,218,.08);color:var(--green)}
.nav-btn.active{background:rgba(13,207,218,.12);color:var(--green)}
.topbar-end{display:flex;align-items:center;gap:8px}
.user-badge{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:4px 10px 4px 14px;
}
.user-name{font-size:.8rem;font-weight:700;color:var(--text)}
.role-pill{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:20px}
.role-pill.principal{background:rgba(200,164,21,.18);color:#d4a017}
.role-pill.vice{background:rgba(43,173,224,.18);color:var(--blue)}
.role-pill.counselor{background:rgba(168,85,247,.18);color:#c084fc}
.role-pill.activity_leader{background:rgba(217,119,6,.18);color:#d97706}
.role-pill.teacher{background:rgba(13,207,218,.18);color:var(--green)}
.role-pill.parent{background:rgba(249,115,22,.18);color:var(--orange)}
.btn-logout{
  padding:6px 12px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:transparent;
  color:var(--text-muted);font-family:'Tajawal',sans-serif;font-size:.78rem;
  cursor:pointer;transition:all .15s;font-weight:600;
}
.btn-logout:hover{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.06)}

/* ══════════════════════════════════════════
   MAIN CONTENT
══════════════════════════════════════════ */
.main{flex:1;padding:22px 24px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes glow{0%,100%{box-shadow:var(--glow-green)}50%{box-shadow:0 0 30px rgba(13,207,218,.45)}}

/* ══════════════════════════════════════════
   CARDS
══════════════════════════════════════════ */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  transition:border-color .2s,box-shadow .2s,transform .2s;
}
.card:hover{border-color:var(--border2);box-shadow:0 4px 20px rgba(0,0,0,.15)}
.card-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,var(--surface2),var(--surface));
}
.card-title{font-size:.88rem;font-weight:700;display:flex;align-items:center;gap:7px}
.card-body{padding:16px 18px}

/* ══════════════════════════════════════════
   STAT CARDS
══════════════════════════════════════════ */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{
  border-radius:16px;padding:20px 18px;position:relative;overflow:hidden;
  transition:transform .22s cubic-bezier(.34,1.2,.64,1),box-shadow .22s;cursor:default;
  border:1px solid transparent;
}
.stat-card:hover{transform:translateY(-5px) scale(1.02)}
.stat-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.05) 0%,transparent 60%);
  pointer-events:none;
}
.stat-card::after{
  content:'';position:absolute;top:-24px;right:-24px;
  width:90px;height:90px;border-radius:50%;opacity:.18;
  transition:transform .3s,opacity .3s;
}
.stat-card:hover::after{transform:scale(1.3);opacity:.28}
.stat-card.g{ background:linear-gradient(135deg,rgba(8,150,160,.2) 0%,rgba(13,207,218,.08) 100%);border-color:rgba(13,207,218,.28)}
.stat-card.g::after{background:var(--green)}
.stat-card.g:hover{box-shadow:0 12px 32px rgba(0,0,0,.25),var(--glow-green)}
.stat-card.o{ background:linear-gradient(135deg,rgba(180,83,9,.2) 0%,rgba(249,115,22,.08) 100%);border-color:rgba(249,115,22,.28)}
.stat-card.o::after{background:var(--orange)}
.stat-card.o:hover{box-shadow:0 12px 32px rgba(0,0,0,.25),0 0 24px rgba(249,115,22,.25)}
.stat-card.b{ background:linear-gradient(135deg,rgba(27,99,180,.2) 0%,rgba(43,173,224,.08) 100%);border-color:rgba(43,173,224,.28)}
.stat-card.b::after{background:var(--blue)}
.stat-card.b:hover{box-shadow:0 12px 32px rgba(0,0,0,.25),0 0 24px rgba(43,173,224,.25)}
.stat-card.gold{ background:linear-gradient(135deg,rgba(100,40,160,.2) 0%,rgba(147,56,255,.08) 100%);border-color:rgba(147,56,255,.28)}
.stat-card.gold::after{background:var(--gold)}
.stat-card.gold:hover{box-shadow:0 12px 32px rgba(0,0,0,.25),var(--glow-gold)}
.stat-card.r{ background:linear-gradient(135deg,rgba(180,20,20,.2) 0%,rgba(239,68,68,.08) 100%);border-color:rgba(239,68,68,.28)}
.stat-card.r::after{background:var(--red)}
.stat-card.r:hover{box-shadow:0 12px 32px rgba(0,0,0,.25),0 0 24px rgba(239,68,68,.2)}
.stat-icon{font-size:1.4rem;margin-bottom:10px;position:relative}
.stat-value{font-size:2.2rem;font-weight:900;line-height:1;margin-bottom:5px;letter-spacing:-.5px;position:relative;transition:transform .2s}
.stat-card:hover .stat-value{transform:scale(1.05)}
.stat-card.g .stat-value{color:var(--green)}
.stat-card.o .stat-value{color:var(--orange)}
.stat-card.b .stat-value{color:var(--blue)}
.stat-card.gold .stat-value{color:var(--gold-lt)}
.stat-card.r .stat-value{color:var(--red)}
.stat-label{color:var(--text-dim);font-size:.76rem;font-weight:500;position:relative}

/* ══════════════════════════════════════════
   GRID LAYOUTS
══════════════════════════════════════════ */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}

/* ══════════════════════════════════════════
   TABS
══════════════════════════════════════════ */
.tabs{
  display:flex;gap:0;
  border-bottom:1px solid var(--border);
  background:var(--surface);padding:0 20px;overflow-x:auto;
}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{
  padding:12px 16px;border:none;background:transparent;
  color:var(--text-dim);font-family:'Tajawal',sans-serif;font-size:.83rem;
  font-weight:600;cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-1px;transition:all .15s;white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:5px;position:relative;
}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}
.tab-btn.active::after{
  content:'';position:absolute;bottom:-1px;left:20%;right:20%;height:1px;
  background:var(--green);filter:blur(3px);opacity:.7;
}
.tab-content{display:none}
.tab-content.active{display:block;animation:fadeIn .25s ease}

/* ══════════════════════════════════════════
   TABLES
══════════════════════════════════════════ */
.table-wrap{overflow-x:auto;border-radius:0 0 16px 16px}
table{width:100%;border-collapse:collapse;font-size:.83rem}
thead tr{
  background:linear-gradient(180deg,var(--surface3),var(--surface2));
}
th{
  padding:12px 16px;text-align:right;color:var(--text-dim);
  font-weight:700;font-size:.78rem;white-space:nowrap;
  border-bottom:1px solid var(--border);letter-spacing:.02em;
}
td{
  padding:10px 16px;border-bottom:1px solid rgba(26,58,90,.3);
  white-space:nowrap;transition:background .15s;
}
tbody tr{transition:all .15s}
tbody tr:hover td{background:rgba(13,207,218,.055);cursor:default}
tr:last-child td{border-bottom:none}
tbody tr:nth-child(even) td{background:rgba(13,207,218,.018)}
tbody tr:nth-child(even):hover td{background:rgba(13,207,218,.055)}

/* ══════════════════════════════════════════
   BADGES
══════════════════════════════════════════ */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.71rem;font-weight:700;letter-spacing:.01em}
.badge-excellent,.badge-ex{background:rgba(13,207,218,.14);color:var(--green);border:1px solid rgba(13,207,218,.25)}
.badge-vgood,.badge-vg{background:rgba(43,173,224,.14);color:var(--blue);border:1px solid rgba(43,173,224,.25)}
.badge-good,.badge-g{background:rgba(168,85,247,.14);color:#c084fc;border:1px solid rgba(168,85,247,.25)}
.badge-pass,.badge-p{background:rgba(217,119,6,.14);color:#fbbf24;border:1px solid rgba(217,119,6,.25)}
.badge-weak,.badge-w{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}

/* ══════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════ */
.btn{
  padding:9px 18px;border-radius:var(--r-sm);border:none;
  font-family:'Tajawal',sans-serif;font-size:.86rem;font-weight:700;
  cursor:pointer;transition:all .2s cubic-bezier(.34,1.2,.64,1);
  display:inline-flex;align-items:center;gap:6px;
  position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,.08);opacity:0;transition:opacity .15s;
}
.btn:hover::after{opacity:1}
.btn:active{transform:scale(.96) !important}
.btn-primary{
  background:linear-gradient(135deg,var(--green-dk),var(--green));color:#fff;
  box-shadow:0 2px 12px rgba(13,207,218,.22);
}
.btn-primary:hover{box-shadow:var(--glow-green),0 4px 16px rgba(0,0,0,.2);transform:translateY(-2px)}
.btn-gold{background:linear-gradient(135deg,#6020b0,var(--gold));color:#fff;box-shadow:0 2px 12px rgba(147,56,255,.22)}
.btn-gold:hover{box-shadow:var(--glow-gold),0 4px 16px rgba(0,0,0,.2);transform:translateY(-2px)}
.btn-outline{
  background:transparent;border:1px solid var(--border);
  color:var(--text-dim);
}
.btn-outline:hover{border-color:var(--green);color:var(--green);background:rgba(13,207,218,.06);transform:translateY(-1px)}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.5);transform:translateY(-1px)}
.btn-sm{padding:5px 11px;font-size:.77rem;border-radius:var(--r-xs)}
.btn-block{width:100%;justify-content:center}

/* ══════════════════════════════════════════
   INPUTS
══════════════════════════════════════════ */
.lbl{display:block;margin-bottom:5px;font-size:.79rem;color:var(--text-dim);font-weight:600;letter-spacing:.01em}
.inp{
  width:100%;padding:9px 13px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text);font-family:'Tajawal',sans-serif;font-size:.87rem;
  transition:border-color .15s,box-shadow .15s;outline:none;
}
.inp:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(13,207,218,.1)}
select.inp{cursor:pointer}
.inp-group{margin-bottom:13px}

/* ══════════════════════════════════════════
   MODALS
══════════════════════════════════════════ */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(2,8,18,.75);
  display:none;align-items:center;justify-content:center;
  z-index:500;padding:20px;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.modal-bg.open{display:flex;animation:fadeModalBg .2s ease both}
@keyframes fadeModalBg{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:20px;padding:28px;max-width:520px;width:100%;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 32px 80px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.04);
  animation:modalIn .25s cubic-bezier(.34,1.2,.64,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(.93) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-size:.93rem;font-weight:800}
.modal-close{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text-muted);font-size:1.1rem;cursor:pointer;
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.modal-close:hover{border-color:var(--red);color:var(--red)}

/* ══════════════════════════════════════════
   FILE UPLOAD
══════════════════════════════════════════ */
.upload-area{
  border:2px dashed var(--border);border-radius:var(--r);
  padding:22px;text-align:center;cursor:pointer;transition:all .2s;
  position:relative;margin-bottom:10px;
}
.upload-area:hover,.upload-area.drag{
  border-color:var(--green);background:rgba(13,207,218,.04);
}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
.upload-icon{font-size:1.8rem;margin-bottom:6px}
.upload-text{font-size:.83rem;color:var(--text-dim)}

/* ══════════════════════════════════════════
   PROGRESS BAR
══════════════════════════════════════════ */
.pbar-wrap{background:var(--surface2);border-radius:99px;overflow:hidden;height:6px}
.pbar-fill{height:100%;border-radius:99px;transition:width .7s ease}

/* ══════════════════════════════════════════
   CHART CONTAINERS
══════════════════════════════════════════ */
.chart-box{position:relative;height:240px}
.chart-box-lg{position:relative;height:300px}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);
  background:var(--surface3);
  border:1px solid var(--border2);
  border-radius:99px;padding:11px 26px;font-size:.84rem;font-weight:700;
  z-index:9999;transition:transform .32s cubic-bezier(.34,1.56,.64,1),opacity .2s;
  white-space:nowrap;opacity:0;
  box-shadow:0 8px 32px rgba(0,0,0,.35),var(--shadow);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.success{border-color:rgba(13,207,218,.5);color:var(--green);background:rgba(13,207,218,.08)}
#toast.error{border-color:rgba(239,68,68,.5);color:var(--red);background:rgba(239,68,68,.08)}
#toast.info{border-color:rgba(43,173,224,.5);color:var(--blue);background:rgba(43,173,224,.08)}

/* ══════════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════════ */
.empty{text-align:center;padding:52px 20px;color:var(--text-muted)}
.empty .ei{font-size:2.8rem;margin-bottom:12px;opacity:.35;display:block}
.empty p{font-size:.85rem;line-height:1.6}

/* ══════════════════════════════════════════
   LOGIN PAGE
══════════════════════════════════════════ */
/* ── Login Split Screen ── */
.login-container{
  flex:1;display:flex;min-height:100vh;overflow:hidden;
}
/* اللوحة اليسرى */
.login-panel-left{
  flex:0 0 48%;
  background:linear-gradient(150deg,#1a2744 0%,#0d1f42 40%,#0a3d3d 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 40px;position:relative;overflow:hidden;
}
.login-panel-left::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 80%,rgba(13,207,218,.18) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 20%,rgba(56,41,114,.4) 0%,transparent 60%);
}
/* دوائر زخرفية */
.login-circles{position:absolute;inset:0;pointer-events:none}
.login-circles span{
  position:absolute;border-radius:50%;border:1px solid rgba(13,207,218,.12);
  animation:spinSlow 20s linear infinite;
}
.login-circles span:nth-child(1){width:380px;height:380px;top:-80px;right:-80px;animation-duration:25s}
.login-circles span:nth-child(2){width:260px;height:260px;bottom:-60px;left:-60px;animation-direction:reverse;animation-duration:18s}
.login-circles span:nth-child(3){width:160px;height:160px;bottom:120px;right:80px;animation-duration:12s}
@keyframes spinSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.login-panel-left-content{position:relative;z-index:1;text-align:center}
.login-ministry-logo{
  width:200px;height:auto;margin-bottom:32px;
  filter:drop-shadow(0 4px 24px rgba(13,207,218,.3));
  animation:floatY 4s ease-in-out infinite;
}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.login-school-name{
  font-size:1.55rem;font-weight:900;color:#fff;
  margin-bottom:8px;line-height:1.3;
  text-shadow:0 2px 16px rgba(0,0,0,.4);
}
.login-school-sub{
  font-size:.82rem;color:rgba(13,207,218,.85);font-weight:500;
  margin-bottom:40px;
}
.login-stats-row{
  display:flex;gap:24px;justify-content:center;
}
.login-stat{
  text-align:center;padding:14px 18px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:14px;backdrop-filter:blur(8px);
}
.login-stat-num{font-size:1.4rem;font-weight:900;color:#0dcfda}
.login-stat-lbl{font-size:.68rem;color:rgba(255,255,255,.55);margin-top:2px}

/* اللوحة اليمنى */
.login-panel-right{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 48px;position:relative;
  background:var(--bg);
}
.login-form-card{
  width:100%;max-width:400px;
  animation:fadeUp .5s cubic-bezier(.34,1.2,.64,1);
}
.login-form-header{margin-bottom:32px}
.login-form-header h2{
  font-size:1.55rem;font-weight:900;color:var(--text);margin-bottom:6px;
}
.login-form-header p{font-size:.82rem;color:var(--text-muted)}
.login-input-wrap{
  margin-bottom:18px;
}
.login-input-wrap label{
  display:block;font-size:.78rem;font-weight:700;
  color:var(--text-dim);margin-bottom:7px;
}
.login-input-field{
  width:100%;padding:12px 16px;border-radius:12px;
  background:var(--surface);border:1.5px solid var(--border);
  color:var(--text);font-family:Tajawal,sans-serif;font-size:.9rem;
  transition:border-color .2s,box-shadow .2s;outline:none;
  box-sizing:border-box;
}
.login-input-field:focus{
  border-color:#0dcfda;
  box-shadow:0 0 0 3px rgba(13,207,218,.12);
}
.login-submit-btn{
  width:100%;padding:13px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#382972 0%,#0d5c6e 100%);
  color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;
  font-family:Tajawal,sans-serif;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 20px rgba(56,41,114,.4);
  margin-top:8px;
}
.login-submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(56,41,114,.5)}
.login-submit-btn:active{transform:translateY(0)}
.login-reset-btn{
  display:block;width:100%;margin-top:10px;
  background:none;border:none;color:var(--text-muted);
  font-size:.72rem;cursor:pointer;font-family:Tajawal,sans-serif;
  padding:6px;
}
.login-reset-btn:hover{color:var(--red)}
.login-err{
  background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.25);
  color:var(--red);border-radius:10px;padding:9px 13px;
  font-size:.81rem;margin-bottom:14px;display:none;
  animation:slideIn .2s ease;
}
.demo-hint{
  margin-top:20px;padding:14px 16px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;font-size:.73rem;color:var(--text-muted);
}
.demo-hint strong{
  color:var(--text-dim);display:flex;align-items:center;
  gap:5px;margin-bottom:10px;font-size:.76rem;
}
.demo-hint-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:4px 0;border-bottom:1px solid var(--border);
}
.demo-hint-row:last-child{border:none}
.demo-hint-role{color:var(--text-dim);font-size:.72rem}
.demo-hint-cred{
  direction:ltr;font-family:monospace;font-size:.72rem;
  color:#0dcfda;background:rgba(13,207,218,.06);
  padding:2px 7px;border-radius:6px;
}
/* Responsive */
@media(max-width:768px){
  .login-panel-left{display:none}
  .login-panel-right{padding:32px 24px}
}

/* ══════════════════════════════════════════
   HOME PAGE
══════════════════════════════════════════ */
.home-hero{
  padding:0;position:relative;overflow:hidden;
  border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,var(--surface2) 0%,var(--surface) 60%,rgba(13,207,218,.04) 100%);
  min-height:160px;
}
.home-hero-bg{
  position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 80% at 90% 50%,rgba(13,207,218,.07),transparent),
    radial-gradient(ellipse 40% 60% at 10% 80%,rgba(56,41,114,.12),transparent);
}
.home-hero-bg::after{
  content:'';position:absolute;top:-60px;right:-60px;
  width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(13,207,218,.06),transparent 70%);
}
.home-hero-content{
  position:relative;display:flex;align-items:center;
  justify-content:space-between;padding:32px 28px 24px;
}
.home-hero-text{flex:1}
.home-hero-badge{
  display:inline-block;padding:4px 14px;border-radius:99px;
  font-size:.72rem;font-weight:700;margin-bottom:12px;
  background:rgba(13,207,218,.12);color:var(--green);
  border:1px solid rgba(13,207,218,.25);
  animation:fadeIn .4s .1s both;
}
.home-hero h2{
  font-family:'Cairo',sans-serif;font-size:1.85rem;font-weight:900;
  margin-bottom:6px;color:var(--text);
  background:linear-gradient(100deg,var(--text) 30%,var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:fadeIn .4s .15s both;
}
.home-hero p{
  color:var(--text-dim);font-size:.85rem;
  animation:fadeIn .4s .2s both;
}
.home-hero-logo{
  font-size:5rem;opacity:1;
  flex-shrink:0;margin-right:8px;
  animation:scaleIn .5s .1s both;
  user-select:none;
}
.home-stats{
  display:flex;gap:14px;margin:0 28px 24px;flex-wrap:wrap;
  animation:fadeIn .4s .25s both;
}
.hs-item{
  display:flex;flex-direction:column;gap:3px;
  padding:12px 18px;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;min-width:100px;
  transition:all .2s;cursor:default;
}
.hs-item:hover{border-color:rgba(13,207,218,.3);transform:translateY(-2px)}
.hs-val{font-size:1.6rem;font-weight:900;color:var(--green);line-height:1}
.hs-lbl{font-size:.69rem;color:var(--text-muted);font-weight:500;margin-top:2px}

/* Section divider */
.home-section-hdr{
  display:flex;align-items:center;gap:14px;
  padding:20px 28px 4px;
}
.home-section-line{flex:1;height:1px;background:var(--border)}
.home-section-title{
  font-size:.72rem;font-weight:700;color:var(--text-muted);
  white-space:nowrap;letter-spacing:.06em;text-transform:uppercase;
}

.home-cards{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:16px;padding:16px 28px 28px;
}
.home-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;padding:28px 20px 22px;cursor:pointer;
  text-align:center;transition:all .25s cubic-bezier(.34,1.2,.64,1);
  position:relative;overflow:hidden;
}
.home-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--green-dk),var(--green),var(--gold));
  opacity:0;transition:opacity .22s;border-radius:18px 18px 0 0;
}
.home-card::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% -10%,rgba(13,207,218,.09),transparent 65%);
  opacity:0;transition:opacity .22s;
}
.home-card:hover{
  border-color:rgba(13,207,218,.45);
  transform:translateY(-6px) scale(1.02);
  box-shadow:0 16px 40px rgba(0,0,0,.35),0 0 0 1px rgba(13,207,218,.15),var(--glow-green);
}
.home-card:hover::before{opacity:1}
.home-card:hover::after{opacity:1}
.home-card:active{transform:translateY(-2px) scale(.99)}
.hc-icon{
  font-size:2.6rem;margin-bottom:14px;
  display:block;transition:transform .25s cubic-bezier(.34,1.4,.64,1);
  filter:drop-shadow(0 0 10px rgba(13,207,218,.25));
}
.home-card:hover .hc-icon{transform:scale(1.18) translateY(-3px)}
.hc-title{font-weight:800;font-size:.94rem;margin-bottom:6px;color:var(--text)}
.hc-desc{color:var(--text-dim);font-size:.74rem;line-height:1.6}

/* ══════════════════════════════════════════
   PARENT PAGE
══════════════════════════════════════════ */
.parent-hero{
  background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);
  border-bottom:1px solid var(--border);padding:26px 24px;
}
.search-box{max-width:520px;margin:0 auto;text-align:center}
.search-box h2{font-size:1.35rem;font-weight:800;margin-bottom:5px}
.search-box p{color:var(--text-dim);margin-bottom:18px;font-size:.86rem}
.search-row{display:flex;gap:10px}
.search-input{
  flex:1;padding:11px 15px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--text);font-family:'Tajawal',sans-serif;font-size:.93rem;
  outline:none;transition:border-color .15s,box-shadow .15s;
}
.search-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(13,207,218,.1)}
.search-btn{
  padding:11px 20px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--green-dk),var(--green));
  color:#fff;font-family:'Tajawal',sans-serif;font-size:.88rem;
  font-weight:700;cursor:pointer;white-space:nowrap;
  box-shadow:0 2px 10px rgba(13,207,218,.2);
  transition:all .15s;
}
.search-btn:hover{box-shadow:var(--glow-green);transform:translateY(-1px)}
.search-mode-btn{
  padding:6px 16px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);font-family:'Tajawal',sans-serif;
  font-size:.81rem;cursor:pointer;transition:all .15s;font-weight:600;
}
.search-mode-btn.active{
  background:rgba(13,207,218,.12);border-color:rgba(13,207,218,.4);color:var(--green);
}
.name-dropdown-item{
  padding:10px 14px;cursor:pointer;transition:background .12s;
  display:flex;flex-direction:column;gap:3px;
  border-bottom:1px solid var(--border);
}
.name-dropdown-item:last-child{border-bottom:none}
.name-dropdown-item:hover{background:rgba(13,207,218,.06)}
.name-dropdown-item .d-name{font-weight:700;font-size:.87rem}
.name-dropdown-item .d-info{color:var(--text-muted);font-size:.75rem}
.student-result{padding:20px 24px;animation:fadeIn .3s ease}
.student-header-card{
  background:linear-gradient(135deg,var(--surface2),var(--surface3));
  border:1px solid var(--border2);border-radius:14px;
  padding:18px 20px;margin-bottom:16px;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.student-avatar{
  width:56px;height:56px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--green-dk),var(--green));
  display:flex;align-items:center;justify-content:center;font-size:1.6rem;
  box-shadow:var(--glow-green);
}
.student-scores-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.score-pill{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px;text-align:center;transition:all .2s;
}
.score-pill:hover{transform:translateY(-2px);border-color:var(--border2)}
.pill-label{color:var(--text-dim);font-size:.72rem;margin-bottom:5px}
.pill-value{font-size:1.3rem;font-weight:900;line-height:1.1}
.pill-max{color:var(--text-muted);font-size:.7rem;margin-top:3px}
.subjects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.subject-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:13px;transition:all .2s;
}
.subject-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.subject-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.subject-name{font-weight:700;font-size:.87rem}
.subject-scores{display:flex;gap:10px;margin-bottom:7px}
.score-item{text-align:center;flex:1}
.score-item .s-label{font-size:.67rem;color:var(--text-muted);margin-bottom:2px}
.score-item .s-val{font-weight:700;font-size:.9rem}

/* ══════════════════════════════════════════
   SCHOOL PAGE STUDENT CARD
══════════════════════════════════════════ */
.student-header{
  display:flex;align-items:center;gap:14px;
  background:linear-gradient(135deg,var(--surface2),var(--surface3));
  border:1px solid var(--border2);border-radius:var(--r);
  padding:16px;margin-bottom:14px;
}
.student-info h3{font-size:1.1rem;font-weight:800;margin-bottom:3px}
.student-meta{display:flex;gap:12px;flex-wrap:wrap}
.student-meta span{color:var(--text-dim);font-size:.8rem}
.student-meta strong{color:var(--text)}

/* ══════════════════════════════════════════
   CARE PAGE
══════════════════════════════════════════ */
.care-count-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
  color:var(--red);border-radius:20px;padding:3px 10px;font-size:.76rem;font-weight:700;
}

/* ══════════════════════════════════════════
   OPERATIONAL STATUS
══════════════════════════════════════════ */
.status-done{background:rgba(13,207,218,.12);color:var(--green);padding:2px 9px;border-radius:20px;font-size:.71rem;font-weight:700;border:1px solid rgba(13,207,218,.2)}
.status-prog{background:rgba(217,119,6,.12);color:#fbbf24;padding:2px 9px;border-radius:20px;font-size:.71rem;font-weight:700;border:1px solid rgba(217,119,6,.2)}
.status-no  {background:rgba(239,68,68,.1);color:var(--red);padding:2px 9px;border-radius:20px;font-size:.71rem;font-weight:700;border:1px solid rgba(239,68,68,.2)}

/* ══════════════════════════════════════════
   SCROLLBAR
══════════════════════════════════════════ */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--green)}

/* ══════════════════════════════════════════
   THEME TOGGLE
══════════════════════════════════════════ */
.theme-toggle{
  width:34px;height:34px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface2);cursor:pointer;font-size:.95rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
.theme-toggle:hover{border-color:var(--green);box-shadow:var(--glow-green)}

/* ══════════════════════════════════════════
   LIGHT THEME OVERRIDES
══════════════════════════════════════════ */
[data-theme="light"] tr:hover td{background:rgba(8,150,160,.04)}
[data-theme="light"] tbody tr:nth-child(even) td{background:rgba(8,150,160,.02)}
[data-theme="light"] .nav-btn:hover,[data-theme="light"] .nav-btn.active{
  background:rgba(8,150,160,.1);color:var(--green)
}
[data-theme="light"] .tab-btn.active{color:var(--green);border-bottom-color:var(--green)}
[data-theme="light"] .home-hero{
  background:linear-gradient(135deg,#f0f9ff 0%,#e8f5f9 60%,#f0faf8 100%);
}
[data-theme="light"] .home-hero h2{
  background:linear-gradient(100deg,#1a3a4a 30%,var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
[data-theme="light"] .home-hero-badge{
  background:rgba(13,207,218,.1);color:#0a7a82;border-color:rgba(13,207,218,.3);
}

/* ══════════════════════════════════════════
   PRINT
══════════════════════════════════════════ */
@media print{
  body{background:#fff!important;color:#000!important}
  body::before,body::after{display:none!important}
  .page{display:none!important}
  #print-area{display:block!important}
  .no-print{display:none!important}
  @page{margin:10mm 12mm;size:A4}
}
#print-area{display:none;direction:rtl;font-family:'Tajawal',sans-serif}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media(max-width:768px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .topbar{padding:0 14px}
  .main{padding:14px}
  .home-cards{padding:14px;grid-template-columns:repeat(2,1fr)}
  .student-scores-grid{grid-template-columns:repeat(2,1fr)}
  .subjects-grid{grid-template-columns:1fr}
  .student-result{padding:14px 12px}
  .search-row{flex-direction:column}
  .search-btn{padding:11px}
}
@media(max-width:480px){
  .home-cards{grid-template-columns:1fr}
  .stats-row{grid-template-columns:1fr 1fr}
}

/* ══ تحسينات الجوال الشاملة ══ */
@media(max-width:768px){
  /* الجداول قابلة للتمرير */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:600px}

  /* التبويبات قابلة للتمرير */
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;white-space:nowrap}
  .tab-btn{flex-shrink:0;font-size:.75rem;padding:9px 12px}

  /* الـ topbar */
  .topbar{flex-wrap:wrap;gap:6px;min-height:auto;padding:8px 12px}
  .topbar-center{display:none} /* إخفاء التنقل الوسطي في الجوال */
  .topbar-brand img{height:50px !important}
  .brand-name{font-size:.85rem !important}
  .brand-sub{font-size:.7rem !important}

  /* الأزرار */
  .btn{font-size:.78rem;padding:7px 12px}
  .btn-sm{font-size:.72rem;padding:5px 9px}

  /* المودال */
  .modal{margin:8px;max-height:92vh;overflow-y:auto}

  /* الكاردات الرئيسية */
  .home-hero-content{flex-direction:column;align-items:flex-start;gap:12px;padding:20px 16px 16px}
  .home-hero h2{font-size:1.3rem !important}

  /* الإحصائيات */
  .stat-card{padding:14px 10px}
  .stat-value{font-size:1.6rem !important}

  /* الفلاتر */
  .g2,.g3,.g4{grid-template-columns:1fr 1fr !important}

  /* إخفاء بعض الأعمدة غير الضرورية في جداول الطلاب */
  .hide-mobile{display:none !important}
}

@media(max-width:480px){
  .home-cards{grid-template-columns:1fr}
  .stats-row{grid-template-columns:1fr 1fr}
  .g2,.g3,.g4{grid-template-columns:1fr !important}
  .topbar-end .btn-logout{font-size:.72rem;padding:5px 8px}
  .topbar-end .theme-toggle{width:28px;height:28px;font-size:.85rem}
}</style>
</head><body>

<script>
const CFG = { term: "الفصل الدراسي الأول 1448/1447", scriptUrl: "" };
const S = { computed:[], studentsMap:{}, teachersData:[], charts:{}, user:{ role:"parent" } };
function loadData() {
  try {
    const c=localStorage.getItem("portal_computed"); if(c) S.computed=JSON.parse(c);
    const sm=localStorage.getItem("portal_students"); if(sm) S.studentsMap=JSON.parse(sm);
    const td=localStorage.getItem("portal_teachers"); if(td) S.teachersData=JSON.parse(td);
    const tm=localStorage.getItem("portal_term"); if(tm) CFG.term=tm;
  } catch(e){}
}
loadData();
(function(){ const t=localStorage.getItem("portal_theme"); if(t) document.documentElement.setAttribute("data-theme",t); })();
function scopedStudents(){return S.computed;}
function load(k){try{return JSON.parse(localStorage.getItem("portal_"+k));}catch(e){return null;}}
function fmtPct(v) { return (+(v||0)).toFixed(1) + '%' }

function getBadgeClass(g) {
  return {ممتاز:'badge-ex','جيد جداً':'badge-vg',جيد:'badge-g',مقبول:'badge-p',ضعيف:'badge-w'}[g]||'badge-w';
}

function pctColor(p) {
  if (p >= 90) return 'var(--green)';      /* cyan/teal = ممتاز */
  if (p >= 80) return 'var(--blue)';       /* blue = جيد جداً */
  if (p >= 70) return 'var(--purple)';     /* purple = جيد */
  if (p >= 50) return 'var(--gold)';       /* purple-accent = مقبول */
  return 'var(--red)';                      /* red = ضعيف */
}

function openWA(phone, msg) {
  let p = String(phone).replace(/\D/g,'');
  if (!p) { showToast('لا يوجد رقم واتساب', 'error'); return; }
  if (p.startsWith('0')) p = '966' + p.slice(1);
  else if (!p.startsWith('966')) p = '966' + p;
  window.open('https://wa.me/' + p + '?text=' + encodeURIComponent(msg), '_blank');
}

function searchByParentId() {
  const id = document.getElementById('parent-id-input').value.trim();
  const errEl = document.getElementById('parent-search-error');
  const resultEl = document.getElementById('parent-result');
  errEl.style.display = 'none';

  if (!id) {
    errEl.innerHTML = '<div style="background:rgba(200,164,21,.1);border:1px solid rgba(200,164,21,.3);color:var(--gold);border-radius:8px;padding:9px 13px;font-size:.82rem">⚠️ يرجى إدخال رقم السجل المدني</div>';
    errEl.style.display = 'block'; return;
  }
  if (!S.computed.length) {
    errEl.innerHTML = '<div style="background:rgba(200,164,21,.1);border:1px solid rgba(200,164,21,.3);color:var(--gold);border-radius:8px;padding:9px 13px;font-size:.82rem">⚠️ لم يتم رفع بيانات الدرجات بعد</div>';
    errEl.style.display = 'block'; return;
  }
  // مقارنة مرنة: نص وأرقام وإزالة .0
  const normalize = v => String(v||'').trim().replace(/\.0+$/,'');
  const student = S.computed.find(s => normalize(s.id) === normalize(id));
  if (!student) {
    errEl.innerHTML = '<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);border-radius:8px;padding:9px 13px;font-size:.82rem">❌ لم يتم العثور على طالب بهذا الرقم</div>';
    errEl.style.display = 'block'; resultEl.style.display = 'none'; return;
  }
  renderParentResult(student, resultEl);
  resultEl.style.display = 'block';
  resultEl.scrollIntoView({behavior:'smooth'});
}

function renderParentCharts(s, classmates) {
  // ── Chart 1: SVG bar — درجات الطالب vs متوسط الفصل ──
  const subNames       = Object.keys(s.subjects || {});
  const studentScores  = subNames.map(n => s.subjects[n].percentage || 0);
  const classAvgScores = subNames.map(subName => {
    const vals = classmates.map(c => c.subjects[subName] ? (c.subjects[subName].percentage||0) : 0);
    return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*10)/10 : 0;
  });

  (function buildBarSVG() {
    const wrap = document.getElementById('parent-bar-wrap');
    const el   = document.getElementById('parent-custom-bar');
    if (!wrap || !el) return;
    const n  = subNames.length;
    const W  = wrap.clientWidth > 50 ? wrap.clientWidth : Math.max(400, window.innerWidth - 120);
    const PT=20, PB=65, PL=40, PR=8, BH=260;
    const colW = Math.max(60, Math.floor((W-PL-PR)/n));
    const TW   = Math.max(W, n*colW+PL+PR);
    const TH   = BH+PT+PB;
    const bW   = Math.floor(colW*.28);
    const g    = Math.floor(colW*.06);
    const parts = [];
    parts.push(`<svg width="${TW}" height="${TH}" xmlns="http://www.w3.org/2000/svg">`);
    [0,25,50,75,100].forEach(v => {
      const gy = PT+BH-(v/100)*BH;
      parts.push(`<line x1="${PL}" y1="${gy}" x2="${TW-PR}" y2="${gy}" stroke="rgba(100,116,139,.15)" stroke-width="1"/>`);
      parts.push(`<text x="${PL-5}" y="${gy+4}" text-anchor="end" font-size="10" fill="#64748b" font-family="Tajawal,sans-serif">${v}</text>`);
    });
    for (let i=0; i<n; i++) {
      const v1 = Math.min(100,Math.max(0,studentScores[i]||0));
      const v2 = Math.min(100,Math.max(0,classAvgScores[i]||0));
      const cx = PL+i*colW+Math.floor((colW-bW*2-g)/2);
      const h1 = Math.round((v1/100)*BH), y1 = PT+BH-h1;
      const h2 = Math.round((v2/100)*BH), y2 = PT+BH-h2;
      parts.push(`<rect x="${cx}" y="${y1}" width="${bW}" height="${h1}" rx="4" fill="rgba(45,158,95,.85)"/>`);
      parts.push(`<rect x="${cx+bW+g}" y="${y2}" width="${bW}" height="${h2}" rx="4" fill="rgba(200,164,21,.65)"/>`);
      const lx = cx+bW+Math.floor(g/2);
      const ly = PT+BH+15;
      const words = subNames[i].split(' ');
      if (words.length<=2) {
        parts.push(`<text x="${lx}" y="${ly}" text-anchor="middle" font-size="9.5" fill="#64748b" font-family="Tajawal,sans-serif">${subNames[i]}</text>`);
      } else {
        parts.push(`<text x="${lx}" y="${ly}" text-anchor="middle" font-size="9.5" fill="#64748b" font-family="Tajawal,sans-serif">${words.slice(0,2).join(' ')}</text>`);
        parts.push(`<text x="${lx}" y="${ly+13}" text-anchor="middle" font-size="9.5" fill="#64748b" font-family="Tajawal,sans-serif">${words.slice(2).join(' ')}</text>`);
      }
    }
    parts.push(`<foreignObject x="0" y="0" width="${TW}" height="28">
      <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;justify-content:center;align-items:center;gap:18px;height:28px;font-family:Tajawal,sans-serif;font-size:11px;color:#64748b;direction:rtl">
        <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:3px;background:rgba(45,158,95,.85);display:inline-block"></span>درجاتك</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:3px;background:rgba(200,164,21,.65);display:inline-block"></span>متوسط الفصل</span>
      </div></foreignObject>`);
    parts.push('</svg>');
    el.innerHTML = parts.join('');
    wrap.style.height = TH + 'px';
    if (TW > W) { el.style.width = TW+'px'; el.style.overflowX = 'auto'; }
  })();

  // ── Chart 2: Doughnut — توزيع الفصل ──
  destroyChart('chart-parent-position');
  const sortedPcts = classmates.map(c => c.cumPct).sort((a,b)=>b-a);
  const buckets = ['90+','80-90','70-80','50-70','أقل من 50'];
  const bucketCounts = [
    sortedPcts.filter(p=>p>=90).length,
    sortedPcts.filter(p=>p>=80&&p<90).length,
    sortedPcts.filter(p=>p>=70&&p<80).length,
    sortedPcts.filter(p=>p>=50&&p<70).length,
    sortedPcts.filter(p=>p<50).length,
  ];
  S.charts['chart-parent-position'] = new Chart(document.getElementById('chart-parent-position'), {
    type:'doughnut',
    data:{ labels:buckets, datasets:[{ data:bucketCounts,
      backgroundColor:['#0dcfda','#2baddf','#7258a5','#382972','#ef4444'],
      borderWidth:0 }] },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:'#8fbfa0', font:{ family:'Tajawal', size:11 } } },
        tooltip:{ callbacks:{ label: ctx => ` ${ctx.label}: ${ctx.raw} طالب` } } } }
  });
}

function printParentStudent(idOrName) {
  const student = S.computed.find(s=>s.id===idOrName||s.name===idOrName);
  if (!student) return;
  document.getElementById('print-area').innerHTML = buildStudentPrintHTML(student, false);
  setTimeout(()=>window.print(), 300);
}

function buildStudentPrintHTML(s, addBreak=false) {
  const classmates = S.computed.filter(x=>x.class===s.class);
  const grademates = S.computed.filter(x=>x.grade===s.grade);
  const classAvg = classmates.length ? (classmates.reduce((a,b)=>a+b.cumPct,0)/classmates.length).toFixed(1) : 0;
  const gradeAvg = grademates.length ? (grademates.reduce((a,b)=>a+b.cumPct,0)/grademates.length).toFixed(1) : 0;
  const today = new Date().toLocaleDateString('ar-SA');
  const gc = g => ({ممتاز:'#16a34a','جيد جداً':'#0284c7',جيد:'#7c3aed',مقبول:'#d97706',ضعيف:'#dc2626'}[g]||'#666');
  const pc = p => p>=90?'#16a34a':p>=80?'#0284c7':p>=70?'#7c3aed':p>=50?'#d97706':'#dc2626';

  const subRows = Object.entries(s.subjects||{}).map(([name,sub]) => `
    <tr style="background:${Object.keys(s.subjects).indexOf(name)%2===0?'#fff':'#f8fafc'}">
      <td style="padding:6px 10px;font-weight:600;border-bottom:1px solid #f1f5f9">${name}</td>
      <td style="text-align:center;border-bottom:1px solid #f1f5f9">${sub.tasks??'—'}</td>
      <td style="text-align:center;border-bottom:1px solid #f1f5f9">${sub.exam??'—'}</td>
      <td style="text-align:center;font-weight:700;border-bottom:1px solid #f1f5f9">${sub.total??'—'}/${sub.maxScore??60}</td>
      <td style="text-align:center;font-weight:700;color:${pc(sub.percentage||0)};border-bottom:1px solid #f1f5f9">${sub.percentage??0}%</td>
      <td style="text-align:center;border-bottom:1px solid #f1f5f9"><span style="background:${gc(sub.grade)}18;color:${gc(sub.grade)};padding:2px 7px;border-radius:10px;font-size:10px;font-weight:800">${sub.grade||'—'}</span></td>
    </tr>`).join('');

  return `
  <div style="max-width:760px;margin:0 auto;font-size:12px;direction:rtl;font-family:'Tajawal',sans-serif">
    <div style="border-bottom:2px solid #208caa;padding-bottom:10px;margin-bottom:12px">
      <div style="text-align:center">
        <div style="font-size:11px;color:#555">المملكة العربية السعودية — وزارة التعليم</div>
        <div style="font-size:11px;color:#555">الإدارة العامة للتعليم بالمنطقة الشرقية</div>
        <div style="font-size:15px;font-weight:900;color:#208caa">مدرسة الظهران الثانوية الحكومية</div>
        <div style="font-size:12px;font-weight:700;color:#333">${CFG.term}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);border:1px solid #cbd5e1;border-radius:6px;overflow:hidden;margin-bottom:10px">
      <div style="padding:7px 12px;border-left:1px solid #e2e8f0;background:#f8fafc"><div style="font-size:9px;color:#64748b">اسم الطالب</div><div style="font-weight:800">${s.name}</div></div>
      <div style="padding:7px 12px;border-left:1px solid #e2e8f0;background:#f8fafc"><div style="font-size:9px;color:#64748b">الصف</div><div style="font-weight:700">${s.grade}</div></div>
      <div style="padding:7px 12px;background:#f8fafc"><div style="font-size:9px;color:#64748b">الفصل</div><div style="font-weight:700">${s.class}</div></div>
      <div style="padding:7px 12px;border-left:1px solid #e2e8f0;border-top:1px solid #e2e8f0"><div style="font-size:9px;color:#64748b">ترتيب الفصل</div><div style="font-weight:700;color:#d97706">${s.classRank} من ${classmates.length}</div></div>
      <div style="padding:7px 12px;border-left:1px solid #e2e8f0;border-top:1px solid #e2e8f0"><div style="font-size:9px;color:#64748b">ترتيب الصف</div><div style="font-weight:700;color:#0284c7">${s.gradeRank} من ${grademates.length}</div></div>
      <div style="padding:7px 12px;border-top:1px solid #e2e8f0"><div style="font-size:9px;color:#64748b">تاريخ الكشف</div><div style="font-weight:700">${today}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px">
      <div style="border:1px solid #bbf7d0;border-radius:6px;padding:8px;text-align:center;background:#f0fdf4"><div style="font-size:9px;color:#15803d">النسبة التراكمية</div><div style="font-size:17px;font-weight:900;color:#16a34a">${s.cumPct}%</div></div>
      <div style="border:1px solid #bfdbfe;border-radius:6px;padding:8px;text-align:center;background:#eff6ff"><div style="font-size:9px;color:#1d4ed8">السلوك</div><div style="font-size:17px;font-weight:900;color:#2563eb">${s.behaviorScore}<span style="font-size:10px">/500</span></div></div>
      <div style="border:1px solid #fde68a;border-radius:6px;padding:8px;text-align:center;background:#fefce8"><div style="font-size:9px;color:#92400e">المواظبة</div><div style="font-size:17px;font-weight:900;color:#d97706">${s.attendanceScore}<span style="font-size:10px">/500</span></div></div>
      <div style="border:1px solid #e9d5ff;border-radius:6px;padding:8px;text-align:center;background:#fdf4ff"><div style="font-size:9px;color:#6b21a8">أيام الغياب</div><div style="font-size:17px;font-weight:900;color:#7c3aed">${s.absenceDays}</div></div>
    </div>
    <div style="font-size:10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:6px 14px;margin-bottom:10px;display:flex;gap:24px">
      <span>متوسط الفصل: <strong>${classAvg}%</strong> <span style="color:${s.cumPct>=classAvg?'#16a34a':'#dc2626'}">${s.cumPct>=classAvg?'▲':'▼'}</span></span>
      <span>متوسط الصف: <strong>${gradeAvg}%</strong> <span style="color:${s.cumPct>=gradeAvg?'#16a34a':'#dc2626'}">${s.cumPct>=gradeAvg?'▲':'▼'}</span></span>
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:11px;border:1px solid #e2e8f0;border-radius:6px;overflow:hidden">
      <thead><tr style="background:#003944;color:#fff">
        <th style="padding:6px 10px;text-align:right">المادة</th>
        <th style="padding:6px 8px;text-align:center">أعمال السنة</th>
        <th style="padding:6px 8px;text-align:center">الاختبار</th>
        <th style="padding:6px 8px;text-align:center">المجموع</th>
        <th style="padding:6px 8px;text-align:center">النسبة</th>
        <th style="padding:6px 8px;text-align:center">التقدير</th>
      </tr></thead>
      <tbody>${subRows}</tbody>
    </table>
    <div style="border-top:2px solid #208caa;padding-top:8px;margin-top:12px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:9px;color:#64748b">صدر بتاريخ: ${today}</div>
      <div style="font-size:9px;color:#64748b">ثانوية الظهران — نظام نتائج الطلاب الإلكتروني</div>
      <div style="border:1px solid #cbd5e1;border-radius:4px;padding:4px 16px;text-align:center;min-width:100px">
        <div style="font-size:8px;color:#64748b;margin-bottom:3px">توقيع ولي الأمر</div>
        <div style="height:16px"></div>
      </div>
    </div>
  </div>
  ${addBreak ? '<div style="page-break-after:always"></div>' : ''}`;
}

function sendParentResultWA(name, id, cumPct, overallGrade, grade, cls) {
  const phone = getParentPhone(id);
  if (!phone) { showToast('لا يوجد رقم لولي أمر: ' + name, 'error'); return; }
  const msg = `السادة أولياء أمور الطالب: ${name}\nالصف: ${grade} | الفصل: ${cls}\n\nنتيجة الفترة الدراسية:\n▫️ النسبة الكلية: ${cumPct}%\n▫️ التقدير: ${overallGrade}\n\nمدرسة الظهران الثانوية الحكومية 🏫`;
  openWA(phone, msg);
}

function getParentPhone(studentId) {
  if (!studentId) return '';
  return S.studentsMap[studentId]?.parentPhone || '';
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(current === 'dark' ? 'light' : 'dark');
}

function destroyChart(id) {
  if (S.charts[id]) { S.charts[id].destroy(); delete S.charts[id]; }
  const c = document.getElementById(id);
  if (c) { const p = c.parentNode; p.removeChild(c); const n = document.createElement('canvas'); n.id=id; p.appendChild(n); }
}
const _orig=searchByParentId;
searchByParentId=function(){loadData();_orig();};
</script>
